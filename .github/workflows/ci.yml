name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: sozune-redirectionio

      # Cargo must resolve the full dependency graph (including the
      # ../http-wasm path dev-dependency) before fmt/clippy can run.
      - name: Checkout http-wasm host
        uses: actions/checkout@v6
        with:
          repository: kemeter/http-wasm
          path: http-wasm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sozune-redirectionio

      - run: cargo fmt --all -- --check
        working-directory: sozune-redirectionio

      - run: cargo clippy --all-targets -- -D warnings
        working-directory: sozune-redirectionio

  build:
    name: build wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: sozune-redirectionio

      - name: Checkout http-wasm host
        uses: actions/checkout@v6
        with:
          repository: kemeter/http-wasm
          path: http-wasm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sozune-redirectionio

      - run: cargo build --release --target wasm32-unknown-unknown
        working-directory: sozune-redirectionio

      # v2 embeds libredirectionio via patched crates. The guest MUST import
      # nothing but the http-wasm host functions — any wasm-bindgen (JS) import
      # means a patch regressed and the module won't load under wasmtime.
      - name: Assert wasm imports only http_handler
        working-directory: sozune-redirectionio
        run: |
          cargo install wasm-tools --locked || true
          WASM=target/wasm32-unknown-unknown/release/sozune_redirectionio.wasm
          MODULES=$(wasm-tools print "$WASM" | grep -oE '\(import "[^"]+"' | sed -E 's/\(import "([^"]+)"/\1/' | sort -u)
          echo "import modules: $MODULES"
          if [ "$MODULES" != "http_handler" ]; then
            echo "::error::wasm imports unexpected modules (expected only http_handler): $MODULES"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: sozune-redirectionio-wasm
          path: sozune-redirectionio/target/wasm32-unknown-unknown/release/sozune_redirectionio.wasm

  test:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: sozune-redirectionio

      # The integration test loads the guest into the http-wasm host, which is
      # referenced as a sibling path dependency (../http-wasm).
      - name: Checkout http-wasm host
        uses: actions/checkout@v6
        with:
          repository: kemeter/http-wasm
          path: http-wasm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sozune-redirectionio

      - run: cargo test --release
        working-directory: sozune-redirectionio
